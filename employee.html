<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Workspace — Crownco HR</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<script src="js/app.js"></script>
<script>
bootPage('employee');
document.getElementById('content').innerHTML = `
<div class="breadcrumb">Workspace / Employee View · <b>Priya Mehta</b></div>
<div class="page-head">
  <div style="display:flex;align-items:center;gap:14px">
    <div class="avatar lg">PM</div>
    <div>
      <h1 class="page-title">Hi Priya 🌅 — Tuesday, May 12</h1>
      <div class="page-sub">Senior SDR · Sales · Mumbai HQ · Shift 9:30 AM – 6:30 PM</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-ghost"><i class="fa-solid fa-calendar"></i> My Calendar</button>
    <a href="attendance.html" class="btn btn-grad"><i class="fa-solid fa-fingerprint"></i> Check In Now</a>
  </div>
</div>

<div class="grid-12">
  <div class="col-4 vstack">
    <div class="card fadeup" style="background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none">
      <div style="display:flex;align-items:center;gap:8px"><i class="fa-solid fa-circle-check"></i> <b>Checked In</b></div>
      <div style="font-size:30px;font-weight:800;margin-top:8px">09:24 AM</div>
      <div style="opacity:.85;font-size:12.5px;margin-top:2px">via WiFi-fence · Mumbai HQ</div>
      <div style="display:flex;justify-content:space-between;margin-top:14px;font-size:11.5px"><span>Shift ends 6:30 PM</span><span><i class="fa-solid fa-bolt"></i> 6h 12m worked</span></div>
    </div>

    <div class="card fadeup delay-1">
      <div class="card-head"><div class="card-title">Today's Goals</div><span class="chip blue">4/6</span></div>
      <div class="vstack" style="gap:8px">
        ${[
          {t:'Make 40 outbound calls',d:'34/40',p:85,g:''},
          {t:'Qualify 8 new leads',d:'6/8',p:75,g:''},
          {t:'2h talk time minimum',d:'1h 52m',p:93,g:'green'},
          {t:'Follow-up with 12 hot leads',d:'12/12',p:100,g:'green'},
          {t:'Update CRM notes',d:'24/30',p:80,g:''},
          {t:'Attend team standup',d:'Done',p:100,g:'green'},
        ].map(g=>`
          <div>
            <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px"><span>${g.t}</span><b>${g.d}</b></div>
            <div class="bar ${g.g}"><span style="width:${g.p}%"></span></div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="ai-card fadeup delay-2">
      <div class="ai-badge"><i class="fa-solid fa-heart"></i> AI Motivation</div>
      <div style="font-size:14.5px;font-weight:700;margin-top:10px;line-height:1.4">"You're 12% ahead of last week's pace 🚀"</div>
      <div style="font-size:12px;color:var(--ink-3);margin-top:6px;line-height:1.5">Your best window: <b>11 AM–2 PM</b>. Block calendar to match peak energy. You have a 7-day call streak — one more day for <b>"Iron Closer"</b> badge!</div>
    </div>

    <div class="card fadeup delay-3">
      <div class="card-head"><div class="card-title">Leave Balance</div></div>
      <div class="grid-3" style="gap:8px">
        <div style="background:var(--bg-3);padding:10px;border-radius:10px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--brand)">12</div><div style="font-size:10.5px;color:var(--ink-3)">Casual</div></div>
        <div style="background:var(--bg-3);padding:10px;border-radius:10px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--green)">8</div><div style="font-size:10.5px;color:var(--ink-3)">Sick</div></div>
        <div style="background:var(--bg-3);padding:10px;border-radius:10px;text-align:center"><div style="font-size:22px;font-weight:800;color:var(--purple)">5</div><div style="font-size:10.5px;color:var(--ink-3)">Earned</div></div>
      </div>
      <a href="leave.html" class="btn btn-soft btn-sm" style="margin-top:10px;width:100%;justify-content:center"><i class="fa-solid fa-plane-departure"></i> Apply Leave</a>
    </div>
  </div>

  <div class="col-5 vstack">
    <div class="card fadeup">
      <div class="card-head"><div><div class="card-title">My Performance · Last 7 Days</div><div class="card-sub">Calls · Talk-time · Conversion</div></div><div class="chip green">+12% WoW</div></div>
      <div style="height:240px"><canvas id="perf"></canvas></div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px;text-align:center">
        <div><div style="font-size:18px;font-weight:800">247</div><div style="font-size:10.5px;color:var(--ink-3)">Calls</div></div>
        <div><div style="font-size:18px;font-weight:800">14h 22m</div><div style="font-size:10.5px;color:var(--ink-3)">Talk-time</div></div>
        <div><div style="font-size:18px;font-weight:800">38%</div><div style="font-size:10.5px;color:var(--ink-3)">Conv.</div></div>
        <div><div style="font-size:18px;font-weight:800">₹2.4L</div><div style="font-size:10.5px;color:var(--ink-3)">Revenue</div></div>
      </div>
    </div>

    <div class="card fadeup delay-1">
      <div class="card-head"><div class="card-title">Assigned Tasks</div><a href="tasks.html" class="chip">View board</a></div>
      <div class="vstack" style="gap:8px">
        ${[
          {t:'Close enterprise demo with Acme Corp',d:'Due today',p:'High',c:'red'},
          {t:'Follow-up: 3 hot leads from yesterday',d:'2:00 PM',p:'High',c:'red'},
          {t:'Send proposal to Wipro contact',d:'Tomorrow',p:'Med',c:'amber'},
          {t:'Update CRM notes for Q2 prospects',d:'Wed',p:'Low',c:'blue'},
        ].map(t=>`
          <div style="display:flex;gap:10px;padding:10px;background:var(--bg-3);border-radius:10px;align-items:center">
            <input type="checkbox" style="width:16px;height:16px;accent-color:var(--brand)">
            <div style="flex:1"><div style="font-size:13px;font-weight:600">${t.t}</div><div style="font-size:11px;color:var(--ink-3)">${t.d}</div></div>
            <span class="chip ${t.c}">${t.p}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="card fadeup delay-2">
      <div class="card-head"><div class="card-title">📲 WhatsApp Report Preview · Tonight 9 PM</div></div>
      <div style="background:#dcf8c6;color:#0F172A;padding:12px 14px;border-radius:12px;font-size:13px;line-height:1.6;max-width:90%;margin-left:auto;border-radius:14px 14px 4px 14px;font-family:ui-monospace,monospace;font-size:12.5px;white-space:pre-wrap">🌟 *Daily Report — Priya Mehta*

📞 Calls made: *47*
⏱️ Talk-time: *2h 32m*
✅ Qualified: *6 leads*
🔥 Hot leads: *3*
🎯 Conversion: *38% (▲ 12% WoW)*
💰 Revenue: *₹2,40,000*
🏆 Rank: *#1 in Mumbai*

💡 AI Tip: Best window today was 11–2. Repeat tomorrow!

Sent by Crownco AI · 21:00</div>
    </div>
  </div>

  <div class="col-3 vstack">
    <div class="card fadeup" style="background:var(--grad);color:#fff;border:none;text-align:center">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;opacity:.8">Performance Score</div>
      <div style="font-size:54px;font-weight:800;margin:4px 0">96</div>
      <div style="opacity:.9;font-size:12.5px">🏆 #1 of 547 employees</div>
      <div style="display:flex;justify-content:space-around;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.2)">
        <div><div style="font-size:18px;font-weight:800">2,450</div><div style="font-size:10px;opacity:.8">Coins</div></div>
        <div><div style="font-size:18px;font-weight:800">12</div><div style="font-size:10px;opacity:.8">Badges</div></div>
        <div><div style="font-size:18px;font-weight:800">7d</div><div style="font-size:10px;opacity:.8">Streak</div></div>
      </div>
    </div>

    <div class="card fadeup delay-1">
      <div class="card-head"><div class="card-title">Recent Badges</div><a href="rewards.html" class="chip">All</a></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
        ${[
          {i:'🥇',n:'Top Closer',c:'#FBBF24'},
          {i:'🔥',n:'Hot Streak',c:'#EF4444'},
          {i:'🎯',n:'100 Calls',c:'#2563EB'},
          {i:'⚡',n:'Fast Reply',c:'#06B6D4'},
          {i:'💎',n:'Premium',c:'#8B5CF6'},
          {i:'🌟',n:'7-Day',c:'#10B981'},
        ].map(b=>`<div style="text-align:center;padding:10px;background:var(--bg-3);border-radius:11px"><div style="font-size:26px">${b.i}</div><div style="font-size:10.5px;font-weight:600;margin-top:4px">${b.n}</div></div>`).join('')}
      </div>
    </div>

    <div class="card fadeup delay-2">
      <div class="card-head"><div class="card-title">Upcoming Meetings</div></div>
      <div class="vstack" style="gap:8px">
        ${[
          {t:'10:30 AM',n:'Team Standup',a:'Sales Team',c:'blue'},
          {t:'2:00 PM',n:'Demo · Acme Corp',a:'with Karan S.',c:'purple'},
          {t:'4:30 PM',n:'1:1 with Manager',a:'Neha Iyer',c:'green'},
        ].map(m=>`
          <div style="display:flex;gap:10px;align-items:center;padding:8px;background:var(--bg-3);border-radius:10px">
            <div style="width:6px;height:36px;background:var(--${m.c==='blue'?'brand':m.c==='purple'?'purple':'green'});border-radius:3px"></div>
            <div style="flex:1"><div style="font-size:12.5px;font-weight:700">${m.n}</div><div style="font-size:11px;color:var(--ink-3)">${m.t} · ${m.a}</div></div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="card fadeup delay-3">
      <div class="card-head"><div class="card-title">Salary Insights</div></div>
      <div style="font-size:22px;font-weight:800">₹68,400</div>
      <div style="font-size:11.5px;color:var(--ink-3);margin-top:2px">May 2026 · estimated net</div>
      <div style="margin-top:10px;font-size:12px;display:flex;flex-direction:column;gap:4px">
        <div style="display:flex;justify-content:space-between"><span class="muted">Base</span><b>₹52,000</b></div>
        <div style="display:flex;justify-content:space-between"><span class="muted">Incentive</span><b style="color:var(--green)">+₹12,400</b></div>
        <div style="display:flex;justify-content:space-between"><span class="muted">Bonus</span><b style="color:var(--green)">+₹4,000</b></div>
      </div>
    </div>
  </div>
</div>
`;

const ct = chartTheme();
new Chart(document.getElementById('perf'),{
  type:'bar',
  data:{labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],datasets:[
    {label:'Calls',data:[32,38,41,36,44,40,16],backgroundColor:'#2563EB',borderRadius:6,stack:'a'},
    {label:'Qualified',data:[4,5,7,6,8,7,2],backgroundColor:'#10B981',borderRadius:6,stack:'b'},
    {type:'line',label:'Conversion %',data:[28,32,38,30,42,38,25],borderColor:'#8B5CF6',backgroundColor:'transparent',tension:.4,borderWidth:2.5,pointRadius:3,yAxisID:'y1'}
  ]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{usePointStyle:true,boxWidth:6}}},scales:{y:{grid:{color:ct.grid}},y1:{position:'right',grid:{display:false}},x:{grid:{display:false}}}}
});
</script>
</body></html>
