<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Leave — Crownco HR</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<script src="js/app.js"></script>
<script>
bootPage('my-leave');
document.getElementById('content').innerHTML = `
<div class="breadcrumb">My Workspace / My Leave</div>
<div class="page-head">
  <div><h1 class="page-title">My Leave</h1><div class="page-sub">Apply leave · view balance · track approvals</div></div>
  <div style="display:flex;gap:8px"><button class="btn btn-grad" onclick="openApply()"><i class="fa-solid fa-plus"></i> Apply Leave</button></div>
</div>

<div class="grid-12">
  <div class="col-8 vstack">
    <div class="kpi-grid">
      ${[
        {l:'Casual Leave',v:'12',sub:'8 used of 20',c:'b',i:'fa-umbrella-beach'},
        {l:'Sick Leave',v:'8',sub:'2 used of 10',c:'g',i:'fa-staff-snake'},
        {l:'Earned Leave',v:'5',sub:'13 used of 18',c:'p',i:'fa-piggy-bank'},
        {l:'Comp Off',v:'2',sub:'Carry-forward',c:'c',i:'fa-clock-rotate-left'},
      ].map((k,i)=>`<div class="kpi fadeup delay-${i+1}"><div class="kpi-icon ${k.c}"><i class="fa-solid ${k.i}"></i></div><div class="kpi-label">${k.l}</div><div class="kpi-value">${k.v} <small>days left</small></div><div class="kpi-trend up">${k.sub}</div></div>`).join('')}
    </div>

    <div class="card fadeup">
      <div class="card-head"><div><div class="card-title">📋 My Leave Requests</div><div class="card-sub">Past 6 months</div></div></div>
      <div style="overflow:auto"><table class="table">
        <thead><tr><th>Type</th><th>Dates</th><th>Days</th><th>Reason</th><th>Applied</th><th>Status</th></tr></thead>
        <tbody>
          ${[
            {t:'Casual',d:'May 14–18, 2026',days:5,r:'Family function',a:'2 days ago',s:'AI reviewing',c:'amber'},
            {t:'Half-day',d:'May 04',days:.5,r:'Doctor appointment',a:'May 03',s:'Approved',c:'green'},
            {t:'Sick',d:'Apr 22–23',days:2,r:'Viral fever',a:'Apr 22',s:'Approved',c:'green'},
            {t:'Casual',d:'Mar 15–17',days:3,r:'Personal',a:'Mar 10',s:'Approved',c:'green'},
            {t:'Earned',d:'Feb 12–18',days:7,r:'Vacation · Goa',a:'Jan 28',s:'Approved',c:'green'},
            {t:'Sick',d:'Jan 09',days:1,r:'Migraine',a:'Jan 09',s:'Approved',c:'green'},
            {t:'WFH',d:'Dec 22–26',days:5,r:'Year-end work-from-home',a:'Dec 15',s:'Rejected',c:'red'},
          ].map(l=>`<tr><td><span class="chip">${l.t}</span></td><td><b>${l.d}</b></td><td>${l.days}</td><td style="color:var(--ink-3);font-size:12.5px">${l.r}</td><td style="color:var(--ink-3);font-size:12px">${l.a}</td><td><span class="chip ${l.c}">${l.s}</span></td></tr>`).join('')}
        </tbody>
      </table></div>
    </div>

    <div class="card fadeup delay-1">
      <div class="card-head"><div><div class="card-title">👥 Who's on leave this week</div></div></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px">
        ${[
          {n:'Aditya Joshi',t:'Casual',d:'May 12–13'},
          {n:'Ananya Verma',t:'Sick',d:'May 12'},
          {n:'Sahil Khan',t:'Earned',d:'May 11–18'},
          {n:'Riya Bose',t:'Casual',d:'May 14'},
        ].map(p=>`<div style="padding:11px;background:var(--bg-3);border-radius:11px;display:flex;align-items:center;gap:10px"><div class="avatar sm">${initials(p.n)}</div><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:12.5px">${p.n}</div><div style="font-size:11px;color:var(--ink-3)">${p.t} · ${p.d}</div></div></div>`).join('')}
      </div>
    </div>
  </div>

  <div class="col-4 vstack">
    <div class="card fadeup">
      <div class="card-head"><div class="card-title">📅 May 2026</div></div>
      <div id="cal"></div>
      <div style="display:flex;gap:14px;margin-top:10px;font-size:11px;flex-wrap:wrap"><span><span class="dot-s" style="background:#8B5CF6"></span> My leave</span><span><span class="dot-s" style="background:#06B6D4"></span> Holiday</span><span><span class="dot-s" style="background:#10B981"></span> Approved</span></div>
    </div>

    <div class="card fadeup delay-1">
      <div class="card-head"><div class="card-title">🇮🇳 Upcoming Holidays</div></div>
      <div class="vstack" style="gap:8px">
        ${[
          {d:'May 22',n:'Buddha Purnima',t:'Optional'},
          {d:'Jun 16',n:'Bakrid · Eid-al-Adha',t:'Public'},
          {d:'Jul 06',n:'Muharram',t:'Public'},
          {d:'Aug 15',n:'Independence Day',t:'Public'},
        ].map(h=>`<div style="display:flex;align-items:center;gap:10px;padding:9px;background:var(--bg-3);border-radius:10px"><div style="width:40px;text-align:center;padding:5px;background:var(--bg-2);border-radius:8px;font-size:11px;font-weight:800;color:var(--brand)">${h.d.split(' ')[1]}<div style="font-size:9px;color:var(--ink-3);font-weight:600">${h.d.split(' ')[0]}</div></div><div style="flex:1"><div style="font-size:12.5px;font-weight:700">${h.n}</div><div style="font-size:11px;color:var(--ink-3)">${h.t}</div></div></div>`).join('')}
      </div>
    </div>

    <div class="ai-card fadeup delay-2">
      <div class="ai-badge"><i class="fa-solid fa-sparkles"></i> AI Tip</div>
      <div style="margin-top:8px;font-size:13px;line-height:1.5">You have <b>5 earned leaves expiring on Dec 31</b>. Consider planning a long weekend with Aug 15 (Fri) — you only need 1 day off!</div>
    </div>
  </div>
</div>
`;

let cal = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;font-size:11px"><div style="font-weight:700;color:var(--ink-3);text-align:center;padding:4px">S</div><div style="font-weight:700;color:var(--ink-3);text-align:center;padding:4px">M</div><div style="font-weight:700;color:var(--ink-3);text-align:center;padding:4px">T</div><div style="font-weight:700;color:var(--ink-3);text-align:center;padding:4px">W</div><div style="font-weight:700;color:var(--ink-3);text-align:center;padding:4px">T</div><div style="font-weight:700;color:var(--ink-3);text-align:center;padding:4px">F</div><div style="font-weight:700;color:var(--ink-3);text-align:center;padding:4px">S</div>';
const events = {4:{c:'#10B981',l:'½'},14:{c:'#8B5CF6'},15:{c:'#8B5CF6'},16:{c:'#8B5CF6'},17:{c:'#8B5CF6'},18:{c:'#8B5CF6'},22:{c:'#06B6D4'}};
for(let i=0;i<35;i++){
  const d = i-4; const has = d>=1 && d<=31;
  const ev = events[d];
  cal += `<div style="aspect-ratio:1;background:${has?(ev?ev.c:'var(--bg-3)'):'transparent'};color:${has&&ev?'#fff':'var(--ink-2)'};border-radius:8px;padding:5px;font-size:11px;font-weight:600;${d===12?'box-shadow:0 0 0 2px var(--brand)':''}">${has?d:''}${ev&&ev.l?'<div style="font-size:8px">'+ev.l+'</div>':''}</div>`;
}
cal += '</div>';
document.getElementById('cal').innerHTML = cal;

function openApply(){
  const m = document.createElement('div'); m.className='modal-bg open';
  m.innerHTML = `
    <div class="modal">
      <div class="modal-head"><div><div style="font-weight:700">Apply Leave</div><div class="tiny muted">AI will analyze impact in real-time</div></div><button onclick="this.closest('.modal-bg').remove()"><i class="fa-solid fa-xmark"></i></button></div>
      <div class="modal-body">
        <div class="field"><label>Leave Type</label><select><option>Casual Leave (12 left)</option><option>Sick Leave (8 left)</option><option>Earned Leave (5 left)</option><option>Half-day</option><option>Emergency</option><option>Work from Home</option></select></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="field"><label>From</label><input type="date" value="2026-05-14"></div><div class="field"><label>To</label><input type="date" value="2026-05-18"></div></div>
        <div class="field"><label>Reason</label><textarea rows="3" placeholder="Optional note for manager…">Family function out of town</textarea></div>
        <div class="ai-card" style="padding:12px"><div class="ai-badge"><i class="fa-solid fa-sparkles"></i> AI Impact Preview</div><div style="margin-top:8px;font-size:12.5px;line-height:1.5">Risk: <b style="color:var(--amber)">MEDIUM (62%)</b> · 4 active deals · 7 hot leads need handover · Karan S. (94% match) suggested as backup. HR will see this analysis.</div></div>
      </div>
      <div class="modal-foot"><button class="btn btn-ghost" onclick="this.closest('.modal-bg').remove()">Cancel</button><button class="btn btn-grad" onclick="this.closest('.modal-bg').remove();toast('✅ Leave request submitted · pending HR approval','success')">Submit Request</button></div>
    </div>`;
  document.body.appendChild(m);
}
</script>
</body></html>
