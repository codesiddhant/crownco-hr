<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave Management — Crownco HR</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<script src="js/app.js"></script>
<script>
bootPage('leave');
document.getElementById('content').innerHTML = `
<div class="breadcrumb">People / Leave Management</div>
<div class="page-head">
  <div><h1 class="page-title">Leave Management <span class="chip blue" style="font-size:11px;margin-left:8px">AI Impact Analysis</span></h1><div class="page-sub">Apply, approve & forecast leave with AI workforce intelligence</div></div>
  <div style="display:flex;gap:8px"><button class="btn btn-ghost"><i class="fa-solid fa-calendar"></i> Calendar View</button><button class="btn btn-grad" onclick="openApply()"><i class="fa-solid fa-plus"></i> Apply Leave</button></div>
</div>

<div class="grid-12">
  <div class="col-8">
    <div class="kpi-grid" style="margin-bottom:14px">
      ${[{l:'Pending Approval',v:'12',c:'a',i:'fa-hourglass-half'},{l:'On Leave Today',v:'33',c:'b',i:'fa-plane-departure'},{l:'High Risk Leaves',v:'4',c:'r',i:'fa-triangle-exclamation'},{l:'Auto-approved',v:'18',c:'g',i:'fa-robot'}].map((k,i)=>`<div class="kpi fadeup delay-${i+1}"><div class="kpi-icon ${k.c}"><i class="fa-solid ${k.i}"></i></div><div class="kpi-label">${k.l}</div><div class="kpi-value">${k.v}</div></div>`).join('')}
    </div>

    <div class="card fadeup">
      <div class="card-head"><div><div class="card-title">Pending Leave Requests</div><div class="card-sub">AI risk-scored & sorted</div></div>
      <div style="display:flex;gap:6px"><button class="chip blue">All</button><button class="chip">Sales</button><button class="chip">Support</button></div></div>
      <div style="overflow:auto"><table class="table">
        <thead><tr><th>Employee</th><th>Type</th><th>Dates</th><th>Days</th><th>AI Impact</th><th>Action</th></tr></thead>
        <tbody id="leave-rows"></tbody>
      </table></div>
    </div>

    <div class="card fadeup delay-1" style="margin-top:14px">
      <div class="card-head"><div><div class="card-title">Team Leave Calendar · May 2026</div></div></div>
      <div id="cal"></div>
    </div>
  </div>

  <div class="col-4 vstack">
    <div class="ai-card fadeup">
      <div class="ai-badge"><i class="fa-solid fa-sparkles"></i> AI Impact Analysis · Priya Mehta</div>
      <div style="margin-top:10px;font-size:14px;font-weight:700">Leave request: 14–18 May (5 days)</div>
      <div style="margin-top:6px;font-size:12.5px;color:var(--ink-3);line-height:1.55">Priya is a top-performer with <b>4 active deals</b> in pipeline (₹8.2L). AI assessed workload, dependencies & team availability.</div>
      <div style="margin-top:14px;padding:12px;background:var(--bg-2);border-radius:11px;border:1px solid var(--line)">
        <div style="display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:6px"><span class="muted">Operational risk score</span><b style="color:var(--amber)">MEDIUM (62%)</b></div>
        <div class="bar amber"><span style="width:62%"></span></div>
      </div>
      <div style="margin-top:12px;font-weight:700;font-size:12px">Suggested backup employees:</div>
      <div class="vstack" style="gap:6px;margin-top:6px">
        ${[{n:'Karan Singh',m:94},{n:'Neha Iyer',m:88},{n:'Rohan Kapoor',m:79}].map(b=>`
          <div style="display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg-2);border-radius:9px;border:1px solid var(--line)">
            <div class="avatar sm">${initials(b.n)}</div>
            <div style="flex:1"><div style="font-weight:600;font-size:12.5px">${b.n}</div><div class="bar" style="margin-top:3px"><span style="width:${b.m}%"></span></div></div>
            <b style="font-size:12px">${b.m}%</b>
          </div>
        `).join('')}
      </div>
      <div style="margin-top:12px;font-size:12px;line-height:1.5"><b>Recommendations:</b><br>• Redistribute 7 hot leads to Karan<br>• Defer 3 non-urgent client follow-ups<br>• Schedule pipeline handover meeting tomorrow</div>
      <div style="display:flex;gap:6px;margin-top:12px"><button class="btn btn-ghost btn-sm" style="flex:1">Reject</button><button class="btn btn-grad btn-sm" style="flex:1">Approve with plan</button></div>
    </div>

    <div class="card fadeup delay-1">
      <div class="card-head"><div class="card-title">Leave Policy</div></div>
      <div style="font-size:12.5px;line-height:1.7"><div style="display:flex;justify-content:space-between"><span class="muted">Casual</span><b>12 days/year</b></div><div style="display:flex;justify-content:space-between"><span class="muted">Sick</span><b>10 days/year</b></div><div style="display:flex;justify-content:space-between"><span class="muted">Earned</span><b>18 days/year</b></div><div style="display:flex;justify-content:space-between"><span class="muted">Maternity</span><b>26 weeks</b></div><div style="display:flex;justify-content:space-between"><span class="muted">Paternity</span><b>15 days</b></div><div style="display:flex;justify-content:space-between"><span class="muted">Emergency</span><b>5 days</b></div></div>
    </div>
  </div>
</div>
`;

const leaves = [
  {n:'Priya Mehta',t:'Casual',d:'May 14–18',days:5,r:62,c:'amber'},
  {n:'Karan Singh',t:'Sick',d:'May 13',days:1,r:18,c:'green'},
  {n:'Sneha Patel',t:'Casual',d:'May 12–19',days:7,r:84,c:'red'},
  {n:'Rohan Kapoor',t:'WFH',d:'May 12–16',days:5,r:38,c:'amber'},
  {n:'Ananya Verma',t:'Earned',d:'May 20–25',days:6,r:24,c:'green'},
  {n:'Vikram Rao',t:'Half-day',d:'May 12',days:.5,r:8,c:'green'},
];
document.getElementById('leave-rows').innerHTML = leaves.map(l=>`
  <tr>
    <td><div class="user-cell"><div class="avatar sm">${initials(l.n)}</div><div><div class="name">${l.n}</div><div class="sub">Sales · Mumbai</div></div></div></td>
    <td><span class="chip">${l.t}</span></td><td>${l.d}</td><td>${l.days}</td>
    <td><div style="display:flex;align-items:center;gap:8px"><div class="bar ${l.c}" style="width:60px"><span style="width:${l.r}%"></span></div><b style="font-size:12px;color:var(--${l.c==='red'?'red':l.c==='amber'?'amber':'green'})">${l.r}%</b></div></td>
    <td><button class="btn btn-sm btn-soft"><i class="fa-solid fa-check"></i> Approve</button> <button class="btn btn-sm btn-ghost"><i class="fa-solid fa-xmark"></i></button></td>
  </tr>
`).join('');

// Calendar
let cal = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;font-size:12px"><div style="font-weight:700;color:var(--ink-3);text-align:center;padding:6px">Sun</div><div style="font-weight:700;color:var(--ink-3);text-align:center;padding:6px">Mon</div><div style="font-weight:700;color:var(--ink-3);text-align:center;padding:6px">Tue</div><div style="font-weight:700;color:var(--ink-3);text-align:center;padding:6px">Wed</div><div style="font-weight:700;color:var(--ink-3);text-align:center;padding:6px">Thu</div><div style="font-weight:700;color:var(--ink-3);text-align:center;padding:6px">Fri</div><div style="font-weight:700;color:var(--ink-3);text-align:center;padding:6px">Sat</div>';
for(let i=0;i<35;i++){
  const d = i-4; const has = d>=1 && d<=31;
  const events = [{d:12,c:'amber',n:3},{d:13,c:'green',n:2},{d:14,c:'red',n:5},{d:15,c:'red',n:6},{d:16,c:'red',n:5},{d:17,c:'red',n:4},{d:18,c:'amber',n:3},{d:20,c:'green',n:1},{d:23,c:'blue',n:2}];
  const ev = events.find(e=>e.d===d);
  cal += `<div style="aspect-ratio:1;background:${has?'var(--bg-3)':'transparent'};border-radius:8px;padding:6px;font-size:11px;${d===12?'border:2px solid var(--brand)':''}">${has?`<div style="font-weight:700">${d}</div>${ev?`<div class="chip ${ev.c}" style="margin-top:4px;font-size:10px;padding:1px 6px">${ev.n} on leave</div>`:''}`:''}</div>`;
}
cal += '</div>';
document.getElementById('cal').innerHTML = cal;

function openApply(){
  const m = document.createElement('div'); m.className='modal-bg open';
  m.innerHTML = `
    <div class="modal">
      <div class="modal-head"><div><div style="font-weight:700">Apply Leave</div><div class="tiny muted">AI will analyze impact in real-time</div></div><button onclick="this.closest('.modal-bg').remove()"><i class="fa-solid fa-xmark"></i></button></div>
      <div class="modal-body">
        <div class="field"><label>Leave Type</label><select><option>Casual Leave</option><option>Sick Leave</option><option>Earned Leave</option><option>Half-day</option><option>Emergency</option></select></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="field"><label>From</label><input type="date" value="2026-05-14"></div><div class="field"><label>To</label><input type="date" value="2026-05-18"></div></div>
        <div class="field"><label>Reason</label><textarea rows="3" placeholder="Optional note for manager…">Family function out of town</textarea></div>
        <div class="ai-card" style="padding:12px"><div class="ai-badge"><i class="fa-solid fa-sparkles"></i> AI Impact Preview</div><div style="margin-top:8px;font-size:12.5px;line-height:1.5">Operational risk: <b style="color:var(--amber)">MEDIUM (62%)</b> · 4 active deals · 7 hot leads need handover · Karan S. (94% match) suggested as backup.</div></div>
      </div>
      <div class="modal-foot"><button class="btn btn-ghost" onclick="this.closest('.modal-bg').remove()">Cancel</button><button class="btn btn-grad" onclick="this.closest('.modal-bg').remove();toast('✅ Leave request submitted','success')">Submit Request</button></div>
    </div>`;
  document.body.appendChild(m);
}
</script>
</body></html>
