<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Performance — Crownco HR</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<script src="js/app.js"></script>
<script>
bootPage('my-performance');
document.getElementById('content').innerHTML = `
<div class="breadcrumb">My Workspace / My Performance</div>
<div class="page-head">
  <div><h1 class="page-title">My Performance</h1><div class="page-sub">AI-generated insights · your daily productivity & growth</div></div>
  <div style="display:flex;gap:8px"><button class="btn btn-ghost"><i class="fa-brands fa-whatsapp"></i> Get WhatsApp Report</button></div>
</div>

<div class="grid-12">
  <div class="col-4 fadeup">
    <div class="card" style="background:linear-gradient(135deg,#8B5CF6,#A855F7);color:#fff;border:none;text-align:center">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;opacity:.85">My Score · This Week</div>
      <div style="font-size:68px;font-weight:800;margin:8px 0;line-height:1">96</div>
      <div style="opacity:.9;font-size:13px">🏆 Rank #1 of 547 employees</div>
      <div class="bar" style="margin-top:14px;background:rgba(255,255,255,.2)"><span style="width:96%;background:#fff"></span></div>
      <div style="font-size:11px;opacity:.85;margin-top:6px">+12 points from last week</div>
    </div>
  </div>

  <div class="kpi col-8 fadeup delay-1" style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:0;background:none;border:none">
    ${[
      {l:'Calls',v:'247',t:'+18 WoW',c:'b',i:'fa-phone'},
      {l:'Talk-time',v:'14h 22m',t:'+2h WoW',c:'p',i:'fa-headset'},
      {l:'Qualified',v:'42',t:'+8 WoW',c:'g',i:'fa-bullseye'},
      {l:'Conv. Ratio',v:'38%',t:'+6 WoW',c:'c',i:'fa-chart-line'},
    ].map((k,i)=>`<div class="kpi"><div class="kpi-icon ${k.c}"><i class="fa-solid ${k.i}"></i></div><div class="kpi-label">${k.l}</div><div class="kpi-value">${k.v}</div><div class="kpi-trend up">${k.t}</div></div>`).join('')}
  </div>

  <div class="card col-8 fadeup">
    <div class="card-head"><div><div class="card-title">📈 My 30-Day Trend</div><div class="card-sub">Productivity · calls · qualified · revenue</div></div></div>
    <div style="height:280px"><canvas id="trend"></canvas></div>
  </div>

  <div class="card col-4 fadeup delay-1">
    <div class="card-head"><div class="card-title">My Skills Radar</div></div>
    <div style="height:280px"><canvas id="radar"></canvas></div>
  </div>

  <div class="ai-card col-7 fadeup">
    <div class="ai-badge"><i class="fa-solid fa-sparkles"></i> AI Coach · Personal recommendations</div>
    <div class="vstack" style="margin-top:12px;gap:10px">
      <div style="padding:12px;background:var(--bg-2);border-radius:11px;border:1px solid var(--line)"><b style="color:var(--green)">✅ Strength:</b> Your <b>11 AM – 2 PM window</b> converts 2.3× better than rest of day. Lock it for cold-calling.</div>
      <div style="padding:12px;background:var(--bg-2);border-radius:11px;border:1px solid var(--line)"><b style="color:var(--amber)">⚠ Improve:</b> Follow-up discipline is 78% — target 90%. <b>4 leads</b> still pending from last week.</div>
      <div style="padding:12px;background:var(--bg-2);border-radius:11px;border:1px solid var(--line)"><b style="color:var(--brand)">💡 Try:</b> Use "ROI calculator" pitch in next 5 calls — top performers like Karan get 40% higher close-rate with it.</div>
      <div style="padding:12px;background:var(--bg-2);border-radius:11px;border:1px solid var(--line)"><b style="color:var(--purple)">🎯 Goal:</b> Close 2 more enterprise deals this week to unlock <b>"Closer Pro"</b> badge + ₹5,000 bonus.</div>
    </div>
  </div>

  <div class="card col-5 fadeup delay-1">
    <div class="card-head"><div class="card-title">🏆 My Team Ranking</div></div>
    ${[
      {n:state.user.name,r:'You',s:96,m:'gold',me:true},
      {n:'Karan Singh',r:'#2',s:92,m:'silver'},
      {n:'Neha Iyer',r:'#3',s:89,m:'bronze'},
      {n:'Rohan Kapoor',r:'#4',s:87},
      {n:'Ananya Verma',r:'#5',s:85},
      {n:'Aditya Joshi',r:'#6',s:82},
    ].map((p,i)=>`
      <div class="lb-row" style="${p.me?'background:var(--brand-soft);border:1px solid var(--brand)':''}">
        <div class="lb-rank ${p.m||''}">${i+1}</div>
        <div class="avatar sm">${initials(p.n)}</div>
        <div style="flex:1"><div style="font-weight:${p.me?'800':'600'};font-size:13px">${p.n}${p.me?' (You)':''}</div></div>
        <b style="color:var(--brand)">${p.s}</b>
      </div>
    `).join('')}
  </div>

  <div class="card col-12 fadeup">
    <div class="card-head"><div class="card-title">📞 My Recent Calls · AI-scored</div><a href="my-day.html" class="chip">View all</a></div>
    <div style="overflow:auto"><table class="table">
      <thead><tr><th>Time</th><th>Client</th><th>Duration</th><th>Outcome</th><th>Sentiment</th><th>AI Score</th><th>Key insight</th></tr></thead>
      <tbody>
        ${[
          {t:'11:14 AM',c:'Acme Corp',d:'12:04',o:'Demo booked',oc:'green',s:'+0.78',sc:'green',sk:96,ai:'Strong ROI pitch'},
          {t:'10:38 AM',c:'Wipro Tech',d:'08:21',o:'Follow-up',oc:'blue',s:'+0.42',sc:'green',sk:84,ai:'Pricing objection — handled'},
          {t:'10:12 AM',c:'HDFC Sales',d:'04:18',o:'Not interested',oc:'red',s:'-0.32',sc:'red',sk:42,ai:'Skip discovery — too direct'},
          {t:'09:48 AM',c:'TCS Lead',d:'14:02',o:'Qualified',oc:'green',s:'+0.65',sc:'green',sk:88,ai:'Excellent rapport'},
          {t:'09:32 AM',c:'Infosys',d:'06:14',o:'Re-schedule',oc:'amber',s:'+0.12',sc:'amber',sk:62,ai:'Lost momentum mid-call'},
        ].map(r=>`<tr><td>${r.t}</td><td><b>${r.c}</b></td><td>${r.d}</td><td><span class="chip ${r.oc}">${r.o}</span></td><td><b style="color:var(--${r.sc==='green'?'green':r.sc==='red'?'red':'amber'})">${r.s}</b></td><td><div style="display:flex;align-items:center;gap:8px"><div class="bar ${r.sk>85?'green':r.sk>60?'amber':'red'}" style="width:60px"><span style="width:${r.sk}%"></span></div><b style="font-size:12px">${r.sk}</b></div></td><td style="color:var(--ink-3);font-size:12px">${r.ai}</td></tr>`).join('')}
      </tbody>
    </table></div>
  </div>
</div>
`;

const ct = chartTheme();
new Chart(document.getElementById('trend'),{
  type:'line',data:{labels:Array.from({length:30},(_,i)=>'D-'+(29-i)),datasets:[
    {label:'Score',data:Array.from({length:30},(_,i)=>70+i*0.7+Math.sin(i)*4),borderColor:'#8B5CF6',backgroundColor:'rgba(139,92,246,.15)',fill:true,tension:.4,borderWidth:2.5,pointRadius:0},
    {label:'Calls',data:Array.from({length:30},(_,i)=>25+i*0.4+Math.cos(i)*5),borderColor:'#06B6D4',backgroundColor:'transparent',tension:.4,borderWidth:2.5,pointRadius:0,borderDash:[6,4]},
    {label:'Qualified',data:Array.from({length:30},(_,i)=>3+i*0.18+Math.cos(i*.5)*1.5),borderColor:'#10B981',backgroundColor:'transparent',tension:.4,borderWidth:2.5,pointRadius:0}
  ]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{usePointStyle:true,boxWidth:6}}},scales:{y:{grid:{color:ct.grid}},x:{grid:{display:false}}}}
});
new Chart(document.getElementById('radar'),{
  type:'radar',data:{labels:['Calls','Conversion','Follow-up','Pitch','Closing','Attendance'],datasets:[
    {label:'You',data:[92,88,78,94,86,96],backgroundColor:'rgba(139,92,246,.2)',borderColor:'#8B5CF6',borderWidth:2.5,pointBackgroundColor:'#8B5CF6'},
    {label:'Team avg',data:[72,68,74,70,68,84],backgroundColor:'transparent',borderColor:'#94A3B8',borderWidth:1.5,borderDash:[5,4],pointBackgroundColor:'#94A3B8'}
  ]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{usePointStyle:true,boxWidth:6}}},scales:{r:{grid:{color:ct.grid},pointLabels:{font:{size:11,weight:'600'}},ticks:{display:false}}}}
});
</script>
</body></html>
