<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People Directory — Crownco HR</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<script src="js/app.js"></script>
<script>
bootPage('people');
document.getElementById('content').innerHTML = `
<div class="breadcrumb">People / Directory</div>
<div class="page-head">
  <div><h1 class="page-title">People · 547</h1><div class="page-sub">Search, filter & manage your entire workforce</div></div>
  <div style="display:flex;gap:8px"><button class="btn btn-ghost"><i class="fa-solid fa-file-export"></i> Export CSV</button><button class="btn btn-ghost"><i class="fa-solid fa-envelope"></i> Invite</button><button class="btn btn-grad"><i class="fa-solid fa-plus"></i> Add Employee</button></div>
</div>

<div class="card fadeup">
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px">
    <div class="search" style="max-width:280px;flex:1"><i class="fa-solid fa-magnifying-glass"></i><input placeholder="Search 547 employees…"></div>
    <select style="padding:9px 12px;border-radius:9px;border:1px solid var(--line);background:var(--bg);font-size:12.5px"><option>All Departments</option><option>Sales</option><option>Support</option><option>Engineering</option></select>
    <select style="padding:9px 12px;border-radius:9px;border:1px solid var(--line);background:var(--bg);font-size:12.5px"><option>All Branches</option><option>Mumbai</option><option>Delhi</option><option>Bangalore</option></select>
    <select style="padding:9px 12px;border-radius:9px;border:1px solid var(--line);background:var(--bg);font-size:12.5px"><option>All Status</option><option>Present</option><option>On Leave</option><option>At Risk</option></select>
    <button class="btn btn-ghost btn-sm" style="margin-left:auto"><i class="fa-solid fa-filter"></i> More filters</button>
    <button class="btn btn-ghost btn-sm"><i class="fa-solid fa-table"></i></button>
    <button class="btn btn-soft btn-sm"><i class="fa-solid fa-grip"></i></button>
  </div>

  <div style="overflow:auto"><table class="table">
    <thead><tr><th><input type="checkbox"></th><th>Employee</th><th>Department</th><th>Role</th><th>Branch</th><th>Status</th><th>Productivity</th><th>Burnout</th><th>Mood</th><th></th></tr></thead>
    <tbody id="rows"></tbody>
  </table></div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:12px;color:var(--ink-3)">
    <span>Showing 1–24 of 547 employees</span>
    <div style="display:flex;gap:4px"><button class="btn btn-ghost btn-sm">‹</button><button class="btn btn-soft btn-sm">1</button><button class="btn btn-ghost btn-sm">2</button><button class="btn btn-ghost btn-sm">3</button><span style="padding:6px 8px">…</span><button class="btn btn-ghost btn-sm">23</button><button class="btn btn-ghost btn-sm">›</button></div>
  </div>
</div>
`;

document.getElementById('rows').innerHTML = MOCK_EMPLOYEES.map(e=>`
  <tr>
    <td><input type="checkbox"></td>
    <td><div class="user-cell"><div class="avatar sm">${e.initials}</div><div><div class="name">${e.name}</div><div class="sub">${e.email}</div></div></div></td>
    <td>${e.dept}</td><td>${e.role}</td><td>${e.branch}</td>
    <td><span class="chip ${e.status==='Present'?'green':e.status==='Late'?'amber':e.status==='On Leave'?'purple':'blue'}">${e.status}</span></td>
    <td><div style="display:flex;align-items:center;gap:8px"><div class="bar ${e.productivity>80?'green':e.productivity>60?'amber':'red'}" style="width:70px"><span style="width:${e.productivity}%"></span></div><b style="font-size:12px">${e.productivity}</b></div></td>
    <td><span class="chip ${e.burnout<30?'green':e.burnout<55?'amber':'red'}">${e.burnout}%</span></td>
    <td style="font-size:18px">${e.mood}</td>
    <td><button class="btn btn-ghost btn-sm"><i class="fa-solid fa-ellipsis"></i></button></td>
  </tr>
`).join('');
</script>
</body></html>
