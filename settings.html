<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Crownco HR</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<script src="js/app.js"></script>
<script>
bootPage('settings');
document.getElementById('content').innerHTML = `
<div class="breadcrumb">System / Settings</div>
<div class="page-head">
  <div><h1 class="page-title">Organization Settings</h1><div class="page-sub">Attendance rules · AI config · security · integrations</div></div>
</div>

<div class="grid-12">
  <div class="col-3 fadeup">
    <div class="card" style="padding:8px">
      ${['Organization','Branches','Attendance Rules','WiFi Whitelist','Geo-Fence Config','AI Settings','Security','Device Management','Role Permissions','Integrations','Billing','Audit Logs'].map((s,i)=>`<button style="display:flex;align-items:center;gap:10px;padding:10px 12px;width:100%;border-radius:9px;text-align:left;background:${i===2?'var(--brand-soft)':'transparent'};color:${i===2?'var(--brand)':'var(--ink-2)'};font-weight:${i===2?'700':'500'};font-size:13px"><i class="fa-solid ${['fa-building','fa-sitemap','fa-clock','fa-wifi','fa-location-dot','fa-sparkles','fa-shield-halved','fa-mobile','fa-user-shield','fa-plug','fa-credit-card','fa-list'][i]}" style="width:16px"></i> ${s}</button>`).join('')}
    </div>
  </div>

  <div class="col-9 vstack">
    <div class="card fadeup">
      <div class="card-head"><div><div class="card-title">⏰ Attendance Rules</div><div class="card-sub">Apply to all branches unless overridden</div></div><button class="btn btn-grad btn-sm">Save changes</button></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="field"><label>Default shift start</label><input value="09:30 AM"></div>
        <div class="field"><label>Default shift end</label><input value="06:30 PM"></div>
        <div class="field"><label>Grace period (late)</label><input value="15 minutes"></div>
        <div class="field"><label>Half-day after</label><input value="4 hours absent"></div>
        <div class="field"><label>Auto check-out time</label><input value="08:00 PM"></div>
        <div class="field"><label>Overtime trigger</label><input value="After 9 hours/day"></div>
      </div>
      <div style="margin-top:14px"><b style="font-size:13px">Allowed methods</b>
        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
          ${['Geo-fence','WiFi-fence','Live Selfie + Gesture','Voice','Manual (with proof)','Biometric','QR-based'].map((m,i)=>`<label style="display:flex;align-items:center;gap:6px;padding:7px 11px;background:${i<5?'var(--brand-soft)':'var(--bg-3)'};border-radius:99px;font-size:12.5px;font-weight:600;color:${i<5?'var(--brand)':'var(--ink-3)'}"><input type="checkbox" ${i<5?'checked':''}> ${m}</label>`).join('')}
        </div>
      </div>
    </div>

    <div class="card fadeup delay-1">
      <div class="card-head"><div class="card-title">📍 Geo-Fence Configuration</div><button class="btn btn-soft btn-sm"><i class="fa-solid fa-plus"></i> Add Office</button></div>
      <div style="overflow:auto"><table class="table">
        <thead><tr><th>Branch</th><th>Coordinates</th><th>Radius</th><th>Employees</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${[['Mumbai HQ','19.0760, 72.8777','200m',147],['Delhi Office','28.6139, 77.2090','150m',98],['Bangalore','12.9716, 77.5946','180m',124],['Pune','18.5204, 73.8567','150m',56],['Hyderabad','17.3850, 78.4867','200m',64]].map(b=>`<tr><td><b>${b[0]}</b></td><td style="font-family:ui-monospace,monospace;font-size:11.5px">${b[1]}</td><td>${b[2]}</td><td>${b[3]}</td><td><span class="chip green">Active</span></td><td><button class="btn btn-ghost btn-sm"><i class="fa-solid fa-pen"></i></button></td></tr>`).join('')}
        </tbody>
      </table></div>
    </div>

    <div class="ai-card fadeup delay-2">
      <div class="ai-badge"><i class="fa-solid fa-sparkles"></i> Crownco AI Settings</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px;font-size:13px">
        <label style="display:flex;justify-content:space-between;padding:11px;background:var(--bg-2);border-radius:10px;border:1px solid var(--line)"><span><b>Daily WhatsApp reports</b><div class="muted" style="font-size:11.5px">9 PM auto-delivery</div></span><input type="checkbox" checked></label>
        <label style="display:flex;justify-content:space-between;padding:11px;background:var(--bg-2);border-radius:10px;border:1px solid var(--line)"><span><b>AI leave impact analysis</b><div class="muted" style="font-size:11.5px">On every leave request</div></span><input type="checkbox" checked></label>
        <label style="display:flex;justify-content:space-between;padding:11px;background:var(--bg-2);border-radius:10px;border:1px solid var(--line)"><span><b>Burnout detection</b><div class="muted" style="font-size:11.5px">Weekly fatigue scan</div></span><input type="checkbox" checked></label>
        <label style="display:flex;justify-content:space-between;padding:11px;background:var(--bg-2);border-radius:10px;border:1px solid var(--line)"><span><b>Voice/Liveness verification</b><div class="muted" style="font-size:11.5px">Anti-spoof</div></span><input type="checkbox" checked></label>
        <label style="display:flex;justify-content:space-between;padding:11px;background:var(--bg-2);border-radius:10px;border:1px solid var(--line)"><span><b>Attrition prediction</b><div class="muted" style="font-size:11.5px">90-day forecast</div></span><input type="checkbox" checked></label>
        <label style="display:flex;justify-content:space-between;padding:11px;background:var(--bg-2);border-radius:10px;border:1px solid var(--line)"><span><b>AI Sales Coach</b><div class="muted" style="font-size:11.5px">Live call suggestions</div></span><input type="checkbox" checked></label>
      </div>
      <div style="margin-top:12px;font-size:12px;color:var(--ink-3)">Self-hosted on Crownco infrastructure · Whisper v3 · vLLM · GPU inference · GDPR compliant</div>
    </div>

    <div class="card fadeup delay-3">
      <div class="card-head"><div class="card-title">🔌 Integrations</div></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
        ${[
          {n:'Crownco CRM',i:'fa-database',c:'#2563EB',e:true},
          {n:'WhatsApp Business',i:'fa-whatsapp',c:'#25D366',e:true,brand:true},
          {n:'Slack',i:'fa-slack',c:'#4A154B',e:true,brand:true},
          {n:'Google Calendar',i:'fa-google',c:'#EA4335',e:true,brand:true},
          {n:'Microsoft Teams',i:'fa-microsoft',c:'#5059C9',e:false,brand:true},
          {n:'Razorpay (Payouts)',i:'fa-credit-card',c:'#02042B',e:true},
          {n:'Twilio Telephony',i:'fa-phone',c:'#F22F46',e:true},
          {n:'Zapier',i:'fa-bolt',c:'#FF4A00',e:false},
          {n:'BambooHR Sync',i:'fa-leaf',c:'#73C41D',e:false},
        ].map(it=>`<div style="padding:14px;background:var(--bg-3);border-radius:11px;display:flex;align-items:center;gap:11px"><div style="width:36px;height:36px;border-radius:9px;background:${it.c}22;color:${it.c};display:grid;place-items:center"><i class="fa-${it.brand?'brands':'solid'} ${it.i}"></i></div><div style="flex:1"><div style="font-weight:700;font-size:12.5px">${it.n}</div><div style="font-size:10.5px;color:var(--ink-3)">${it.e?'Connected':'Not connected'}</div></div><span class="chip ${it.e?'green':''}">${it.e?'On':'Off'}</span></div>`).join('')}
      </div>
    </div>
  </div>
</div>
`;
</script>
</body></html>
